<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasya">
<meta name="theme-color" content="#080810">
<title>Tasya · Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--card:#111118;--card2:#1a1a24;--border:rgba(255,255,255,0.07);
  --accent:#c8f55a;--teal:#5af5c8;--orange:#ffb347;--pink:#ff6b9d;
  --purple:#a78bfa;--blue:#60a5fa;--text:#f0f0f5;--muted:#52526e;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
  min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;
  padding-top:calc(var(--safe-top));padding-bottom:calc(var(--safe-bottom) + 72px)}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,245,90,.06),transparent 65%);top:-150px;right:-150px}
.amb::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;
  background:radial-gradient(circle,rgba(90,245,200,.04),transparent 65%);bottom:50px;left:-80px}
.wrap{position:relative;z-index:1}

/* sync status */
.sync-bar{display:flex;align-items:center;gap:7px;padding:6px 18px 0;font-size:11px;color:var(--muted);font-weight:500}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--accent);box-shadow:0 0 6px rgba(200,245,90,.5)}
.sync-dot.err{background:#ff6b6b}
.sync-dot.loading{background:var(--orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.hdr{padding:10px 18px 10px;display:flex;align-items:flex-start;justify-content:space-between}
.hdr-l .greet{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.04em}
.hdr-l .title{font-size:24px;font-weight:900;letter-spacing:-.03em;line-height:1.1}
.hdr-l .title span{color:var(--accent)}
.date-chip{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:8px 12px;text-align:right}
.date-chip strong{display:block;font-size:15px;font-weight:800;line-height:1}
.date-chip small{font-size:11px;color:var(--muted);font-weight:500}

.hero{margin:6px 18px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:18px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,245,90,.05),transparent 60%);pointer-events:none}
.ring-wrap{position:relative;width:86px;height:86px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:26px;font-weight:900;color:var(--accent);line-height:1}
.ring-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.hero-info{flex:1}
.hero-ttl{font-size:16px;font-weight:800;letter-spacing:-.01em;margin-bottom:3px}
.hero-sub{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:10px}
.dots-row{display:flex;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--card2);border:1px solid var(--border);transition:all .3s}
.dot.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(200,245,90,.5)}
.dot.cur{border-color:var(--accent);background:transparent;box-shadow:0 0 0 2px rgba(200,245,90,.2)}

.sec{padding:2px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.sec-c{font-size:11px;color:var(--muted);font-weight:600}

.habits{padding:0 18px;display:flex;flex-direction:column;gap:9px}
.hab{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:14px 14px 14px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none}
.hab:active{transform:scale(.97)}
.hab.on{border-color:var(--hc);background:color-mix(in srgb,var(--hc) 9%,var(--card))}
.hab.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--hc);border-radius:0 2px 2px 0}
.hr{position:relative;width:46px;height:46px;flex-shrink:0}
.hr svg{transform:rotate(-90deg)}
.hr-ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:19px}
.hi{flex:1;min-width:0}
.hn{font-size:14px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.hab.on .hn{color:var(--hc)}
.hm{font-size:11px;color:var(--muted);margin-top:1px;font-weight:400}
.hck{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  color:transparent;flex-shrink:0;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.hab.on .hck{background:var(--hc);border-color:var(--hc);color:#000;transform:scale(1.1)}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
.popping{animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
.hab.loading-hab{opacity:.6;pointer-events:none}

.week{margin:14px 18px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:14px}
.week-ttl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:11px}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px}
.wd-l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.wd-d{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;background:var(--card2);border:1px solid var(--border);color:var(--muted);transition:all .2s}
.wd-d.on{background:rgba(200,245,90,.15);border-color:rgba(200,245,90,.4);color:var(--accent)}
.wd-d.today{border-color:var(--accent);color:var(--text);box-shadow:0 0 0 2px rgba(200,245,90,.2)}
.wd-d.fut{opacity:.25}

.bubble-wrap{margin:14px 18px 0}
.bubble{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:14px 16px}
.bubble-from{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.bubble-txt{font-size:13px;line-height:1.6;color:#ccc;font-weight:400}

.pg{display:none}.pg.act{display:block}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:10px 0 calc(var(--safe-bottom) + 8px);
  display:flex;justify-content:space-around;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  opacity:.35;transition:opacity .2s;min-width:60px;padding:4px 0;-webkit-user-select:none;user-select:none}
.ni.act{opacity:1}
.ni.act .ni-ic{color:var(--accent)}
.ni-ic{font-size:22px;transition:color .2s}
.ni-lb{font-size:10px;font-weight:700;letter-spacing:.04em}

.lsec{padding:8px 18px 0}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;margin-bottom:11px}
.lcard-ttl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}
.irow{display:flex;gap:8px}
.inp{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:14px;
  padding:11px 13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:rgba(200,245,90,.4)}
.inp::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#000;border:none;border-radius:14px;padding:11px 17px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;cursor:pointer;
  white-space:nowrap;transition:opacity .15s;-webkit-appearance:none}
.btn:active{opacity:.75}
.entries{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto}
.entry{background:var(--card2);border:1px solid var(--border);border-radius:13px;
  padding:11px 13px;display:flex;gap:9px;align-items:flex-start}
.etime{font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px}
.etxt{font-size:13px;color:#bbb;line-height:1.4}

.wentry{background:var(--card2);border:1px solid var(--border);border-radius:13px;
  padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.wdate{font-size:11px;color:var(--muted);width:88px;flex-shrink:0}
.wbar{flex:1;height:5px;background:var(--card);border-radius:100px;overflow:hidden}
.wbar-f{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .8s ease}
.wkg{font-size:14px;font-weight:800;width:48px;text-align:right}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:8px 18px 0}
.stile{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;position:relative;overflow:hidden}
.stile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc,var(--accent));opacity:.7}
.stile-l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:700}
.stile-v{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.03em}
.stile-u{font-size:12px;color:var(--muted);font-weight:400;margin-left:3px}
.stile-s{font-size:11px;color:var(--muted);margin-top:4px}

.hist{padding:12px 18px 0}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:9px}
.hcard-name{font-size:13px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.hdots{display:flex;gap:3px;flex-wrap:wrap}
.hdot{width:11px;height:11px;border-radius:4px;background:var(--card2);border:1px solid var(--border);transition:all .15s}
.hdot.on{background:var(--hc,var(--accent));border-color:transparent;opacity:.9}
.hdot.miss{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.1)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.a0{animation:fadeUp .35s ease both}
.a1{animation:fadeUp .35s .06s ease both}
.a2{animation:fadeUp .35s .12s ease both}
.a3{animation:fadeUp .35s .18s ease both}
.a4{animation:fadeUp .35s .24s ease both}
</style>
</head>
<body>
<div class="amb"></div>
<div class="wrap">

<!-- TODAY PAGE -->
<div class="pg act" id="pg-today">
  <div class="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-txt">Connecting to sync...</span>
  </div>
  <div class="hdr a0">
    <div class="hdr-l">
      <div class="greet" id="greet">Good morning</div>
      <div class="title">Luq's <span>Habits</span></div>
    </div>
    <div class="date-chip">
      <strong id="hdate">—</strong>
      <small id="hday">—</small>
    </div>
  </div>
  <div class="hero a1">
    <div class="ring-wrap">
      <svg width="86" height="86" viewBox="0 0 86 86">
        <circle cx="43" cy="43" r="36" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
        <circle cx="43" cy="43" r="36" fill="none" stroke="url(#rg)" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="226.19" stroke-dashoffset="226.19"
          id="main-arc" style="transition:stroke-dashoffset .6s ease"/>
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5af5c8"/><stop offset="100%" stop-color="#c8f55a"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-ctr">
        <div class="ring-num" id="rnum">0</div>
        <div class="ring-lbl">done</div>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-ttl" id="httl">Loading... ⏳</div>
      <div class="hero-sub" id="hsub">Syncing with cloud</div>
      <div class="dots-row" id="dots"></div>
    </div>
  </div>
  <div class="sec a2">
    <div class="sec-t">Today's Habits</div>
    <div class="sec-c" id="hcount">— / 7</div>
  </div>
  <div class="habits a2" id="hlist"></div>
  <div class="week a3">
    <div class="week-ttl">This Week</div>
    <div class="week-days" id="wdays"></div>
  </div>
  <div class="bubble-wrap a4">
    <div class="bubble">
      <div class="bubble-from">TASYA 🥰</div>
      <div class="bubble-txt" id="tmsg">Loading your message...</div>
    </div>
  </div>
</div>

<!-- LOG PAGE -->
<div class="pg" id="pg-log">
  <div class="hdr">
    <div class="hdr-l"><div class="greet">Track everything</div><div class="title">My <span>Log</span></div></div>
  </div>
  <div class="lsec">
    <div class="lcard">
      <div class="lcard-ttl">📝 Daily Notes</div>
      <div class="irow">
        <input class="inp" id="note-inp" placeholder="How was today? Steps? Feel?...">
        <button class="btn" onclick="addNote()">ADD</button>
      </div>
      <div style="height:10px"></div>
      <div class="entries" id="notes-list"></div>
    </div>
    <div class="lcard">
      <div class="lcard-ttl">⚖️ Weight Log</div>
      <div class="irow" style="margin-bottom:11px">
        <input class="inp" id="wt-inp" type="number" step="0.1" min="30" max="300" placeholder="Enter weight (kg)...">
        <button class="btn" onclick="addWeight()">LOG</button>
      </div>
      <div id="wt-list"></div>
    </div>
  </div>
</div>

<!-- STATS PAGE -->
<div class="pg" id="pg-stats">
  <div class="hdr">
    <div class="hdr-l"><div class="greet">Your progress</div><div class="title">My <span>Stats</span></div></div>
  </div>
  <div class="sgrid" id="sgrid"></div>
  <div class="hist" id="hist"></div>
</div>

</div>

<nav class="bnav">
  <div class="ni act" id="nav-today" onclick="goto('today',this)">
    <div class="ni-ic">⊙</div><div class="ni-lb">Today</div>
  </div>
  <div class="ni" id="nav-log" onclick="goto('log',this)">
    <div class="ni-ic">✏️</div><div class="ni-lb">Log</div>
  </div>
  <div class="ni" id="nav-stats" onclick="goto('stats',this)">
    <div class="ni-ic">📊</div><div class="ni-lb">Stats</div>
  </div>
</nav>

<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────────────────
const SB_URL = 'https://vjtwcregkwxbwyedzhvg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdHdjcmVna3d4Ynd5ZWR6aHZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTI0MzcsImV4cCI6MjA5NjM4ODQzN30.Te7Ut8Lc23YP0HldzuxTZYKDA7lo25VFm_YOY7w_MT0';
const USER   = 'luq';

const API = {
  async req(method, table, body = null, params = '') {
    const url = `${SB_URL}/rest/v1/${table}${params}`;
    const opts = {
      method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : 'return=representation'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  },
  get:    (table, params) => API.req('GET', table, null, params),
  post:   (table, body)   => API.req('POST', table, body),
  patch:  (table, body, params) => API.req('PATCH', table, body, params),
  delete: (table, params) => API.req('DELETE', table, null, params),
};

// ── CONFIG ────────────────────────────────────────────────────────────────────
const HABITS = [
  {id:'steps', name:'10,000 Steps',      icon:'🚶', color:'#c8f55a', note:'Daily walk goal'},
  {id:'if',    name:'16:8 Fasting',      icon:'⏱', color:'#5af5c8', note:'12pm – 8pm window'},
  {id:'water', name:'8 Glasses Water',   icon:'💧', color:'#60a5fa', note:'Stay hydrated'},
  {id:'sleep', name:'Sleep by Midnight', icon:'😴', color:'#a78bfa', note:'Target 7+ hrs'},
  {id:'clean', name:'Clean Day',         icon:'✊', color:'#ff6b9d', note:'Stay strong'},
  {id:'hair',  name:'Hair Tonic',        icon:'💆', color:'#ffb347', note:"L'Oréal Aminexil"},
  {id:'sync',  name:'Update Tasya',      icon:'📤', color:'#f97316', note:'Export Samsung Health'},
];

const START    = new Date('2026-05-30');
const todayKey = new Date().toDateString();

// ── LOCAL STATE (cache) ───────────────────────────────────────────────────────
let checks  = {};   // {habit_id: bool}
let notes   = [];
let weights = [];
let streak  = {};   // {date_key: bool} — perfect days
let habHist = {};   // {habit_id: {date_key: bool}}
let synced  = false;

// ── SYNC STATUS UI ────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

// ── LOAD FROM SUPABASE ────────────────────────────────────────────────────────
async function loadAll() {
  setSyncStatus('loading', 'Syncing...');
  try {
    // habits for today
    const hrows = await API.get('habits', `?user_id=eq.${USER}&date_key=eq.${encodeURIComponent(todayKey)}`);
    checks = {};
    hrows.forEach(r => { checks[r.habit_id] = r.done; });

    // all habits for streak/history (last 60 days)
    const since = new Date(); since.setDate(since.getDate() - 60);
    const allH  = await API.get('habits', `?user_id=eq.${USER}&order=created_at.desc&limit=1000`);
    habHist = {}; streak = {};
    allH.forEach(r => {
      if (!habHist[r.habit_id]) habHist[r.habit_id] = {};
      if (r.done) habHist[r.habit_id][r.date_key] = true;
    });
    // perfect day = all 7 done
    const byDate = {};
    allH.forEach(r => {
      if (!byDate[r.date_key]) byDate[r.date_key] = 0;
      if (r.done) byDate[r.date_key]++;
    });
    Object.entries(byDate).forEach(([dk, cnt]) => { if (cnt >= HABITS.length) streak[dk] = true; });

    // notes
    const nrows = await API.get('logs', `?user_id=eq.${USER}&order=created_at.desc&limit=60`);
    notes = nrows.map(r => ({ id: r.id, time: r.time_label, txt: r.txt }));

    // weights
    const wrows = await API.get('weights', `?user_id=eq.${USER}&order=created_at.asc&limit=100`);
    weights = wrows.map(r => ({ id: r.id, date: r.date_label, kg: parseFloat(r.kg) }));

    synced = true;
    setSyncStatus('ok', 'Synced ✓');
    renderHabits();
    renderWeek();
  } catch (e) {
    setSyncStatus('err', 'Sync failed — working offline');
    console.error(e);
    // fallback to localStorage
    checks  = JSON.parse(localStorage.getItem('th_checks_' + todayKey) || '{}');
    notes   = JSON.parse(localStorage.getItem('th_notes') || '[{"time":"Day 1","txt":"🚀 Journey starts!"}]');
    weights = JSON.parse(localStorage.getItem('th_weights') || '[{"date":"30 May 2026","kg":100}]');
    streak  = JSON.parse(localStorage.getItem('th_streak') || '{}');
    habHist = JSON.parse(localStorage.getItem('th_habHist') || '{}');
    renderHabits();
    renderWeek();
  }
}

// ── TOGGLE HABIT ──────────────────────────────────────────────────────────────
async function tap(id) {
  const newVal = !checks[id];
  checks[id] = newVal;

  // optimistic UI
  renderHabits();
  const ckEl = document.getElementById('ck-' + id);
  if (ckEl) { ckEl.classList.remove('popping'); void ckEl.offsetWidth; ckEl.classList.add('popping'); }

  // mark habit row loading
  const habEl = document.getElementById('h-' + id);
  if (habEl) habEl.classList.add('loading-hab');

  try {
    await API.post('habits', {
      user_id: USER, date_key: todayKey, habit_id: id, done: newVal
    });
    // update history
    if (!habHist[id]) habHist[id] = {};
    if (newVal) habHist[id][todayKey] = true;
    else delete habHist[id][todayKey];

    // check perfect day
    const allDone = HABITS.every(h => checks[h.id]);
    if (allDone) streak[todayKey] = true;
    else delete streak[todayKey];

    setSyncStatus('ok', 'Synced ✓');
  } catch (e) {
    setSyncStatus('err', 'Sync failed');
    // save locally as fallback
    localStorage.setItem('th_checks_' + todayKey, JSON.stringify(checks));
  }

  if (habEl) habEl.classList.remove('loading-hab');
  renderHabits();
  renderWeek();
}

// ── RENDER HABITS ─────────────────────────────────────────────────────────────
const TITLES = ['Let\'s start! 💪','Good start! 🔥','Building momentum ⚡','Halfway there! 🏃','4 down! Keep going! 🔥','So close! 🌟','One more! Almost! 🎯','PERFECT DAY! 🎉🏆'];
const SUBS   = ['Tick your habits for today','Keep the momentum going!','You\'re doing great Luq!','Consistency is key — push on!','Tasya is proud of you 🥰','Almost there, don\'t stop!','One last habit to go!','All 7 done! Legendary! 🥰'];
const MSGS   = [
  "Fresh day, fresh start Luq! Tick off your habits one by one. Tasya believes in you! 🥰",
  "Great start! You've already begun — that's the hardest part. Keep going! 💪",
  "2 habits done! Consistency is building. Your body is already responding. 🔥",
  "Halfway through! This is exactly what Phase 1 is about. Consistency over perfection. 🚶‍♂️",
  "4 habits down! You're making real changes today. Tasya is keeping count! ⚡",
  "5 habits! Almost there Luq — you're making Tasya very proud today 🥰",
  "6 out of 7! Jangan give up sekarang — one last one! 🏃‍♂️",
  "PERFECT DAY! 🎉 All 7 habits done! Both phones show the same win. This is what consistency looks like! 💪🥰"
];

function renderHabits() {
  const done = HABITS.filter(h => checks[h.id]).length;
  document.getElementById('hcount').textContent = `${done} / ${HABITS.length}`;

  // ring
  const off = 226.19 * (1 - done / HABITS.length);
  document.getElementById('main-arc').setAttribute('stroke-dashoffset', off);
  document.getElementById('rnum').textContent = done;
  document.getElementById('httl').textContent = TITLES[Math.min(done, TITLES.length - 1)];
  document.getElementById('hsub').textContent = SUBS[Math.min(done, SUBS.length - 1)];
  document.getElementById('tmsg').textContent = MSGS[Math.min(done, MSGS.length - 1)];

  const circ = 2 * Math.PI * 17;
  document.getElementById('hlist').innerHTML = HABITS.map(h => {
    const on = checks[h.id];
    return `
    <div class="hab${on?' on':''}" id="h-${h.id}" style="--hc:${h.color}" onclick="tap('${h.id}')">
      <div class="hr">
        <svg width="46" height="46" viewBox="0 0 46 46">
          <circle cx="23" cy="23" r="17" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4.5"/>
          <circle cx="23" cy="23" r="17" fill="none" stroke="${h.color}" stroke-width="4.5"
            stroke-linecap="round" stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${on ? 0 : circ.toFixed(2)}"
            style="transition:stroke-dashoffset .5s ease"/>
        </svg>
        <div class="hr-ic">${h.icon}</div>
      </div>
      <div class="hi">
        <div class="hn">${h.name}</div>
        <div class="hm">${h.note}</div>
      </div>
      <div class="hck" id="ck-${h.id}">${on ? '✓' : ''}</div>
    </div>`;
  }).join('');

  // streak dots
  const today = new Date(); today.setHours(0,0,0,0);
  const days7 = Array.from({length:7}, (_,i) => { const d=new Date(today); d.setDate(today.getDate()-(6-i)); return d; });
  document.getElementById('dots').innerHTML = days7.map(d => {
    const k = d.toDateString();
    return `<div class="dot${streak[k]?' on':k===todayKey?' cur':''}"></div>`;
  }).join('');
}

// ── WEEK STRIP ────────────────────────────────────────────────────────────────
function renderWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow   = today.getDay();
  const mon   = new Date(today); mon.setDate(today.getDate() - (dow===0?6:dow-1));
  const days  = Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
  const lbls  = ['M','T','W','T','F','S','S'];
  document.getElementById('wdays').innerHTML = days.map((d,i) => {
    const k=d.toDateString(), iT=k===todayKey, iF=d>today, iD=streak[k];
    const cls = iD?'wd-d on':iT?'wd-d today':iF?'wd-d fut':'wd-d';
    return `<div class="wd"><div class="wd-l">${lbls[i]}</div><div class="${cls}">${d.getDate()}</div></div>`;
  }).join('');
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
async function addNote() {
  const inp = document.getElementById('note-inp');
  const v   = inp.value.trim(); if (!v) return;
  const now = new Date();
  const tl  = now.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
  inp.value = '';
  try {
    const rows = await API.post('logs', { user_id: USER, time_label: tl, txt: v });
    notes.unshift({ id: rows[0]?.id, time: tl, txt: v });
    setSyncStatus('ok', 'Synced ✓');
  } catch {
    notes.unshift({ time: tl, txt: v });
    setSyncStatus('err', 'Saved locally');
  }
  renderNotes();
}

function renderNotes() {
  document.getElementById('notes-list').innerHTML =
    notes.length
      ? notes.map(n=>`<div class="entry"><span class="etime">${n.time}</span><span class="etxt">${n.txt}</span></div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;padding:6px 0">No notes yet.</div>';
}

// ── WEIGHT ────────────────────────────────────────────────────────────────────
async function addWeight() {
  const inp = document.getElementById('wt-inp');
  const v   = parseFloat(inp.value);
  if (!v || v < 30 || v > 300) return;
  const dl = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  inp.value = '';
  try {
    const rows = await API.post('weights', { user_id: USER, date_label: dl, kg: v });
    weights.push({ id: rows[0]?.id, date: dl, kg: v });
    setSyncStatus('ok', 'Synced ✓');
  } catch {
    weights.push({ date: dl, kg: v });
    setSyncStatus('err', 'Saved locally');
  }
  renderWeights();
}

function renderWeights() {
  if (!weights.length) return;
  const maxW = Math.max(...weights.map(w=>w.kg));
  document.getElementById('wt-list').innerHTML =
    weights.slice().reverse().map(w=>`
      <div class="wentry">
        <span class="wdate">${w.date}</span>
        <div class="wbar"><div class="wbar-f" style="width:${Math.max(5,((w.kg-60)/(maxW-59))*100).toFixed(1)}%"></div></div>
        <span class="wkg">${w.kg}kg</span>
      </div>`).join('');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const today     = new Date(); today.setHours(0,0,0,0);
  const perfDays  = Object.values(streak).filter(Boolean).length;
  const latestW   = weights[weights.length-1]?.kg ?? 100;
  const startW    = weights[0]?.kg ?? 100;
  const lost      = Math.max(0, startW - latestW).toFixed(1);
  const journeyD  = Math.floor((today - START) / 86400000) + 1;

  document.getElementById('sgrid').innerHTML = [
    {l:'Perfect Days',   v:perfDays,  u:'days', s:'All 7 habits done',           c:'#c8f55a'},
    {l:'Journey',        v:journeyD,  u:'days', s:'Started 30 May 2026',          c:'#5af5c8'},
    {l:'Weight Lost',    v:lost,      u:'kg',   s:`${startW}kg → ${latestW}kg`,   c:'#ff6b9d'},
    {l:'Current Weight', v:latestW,   u:'kg',   s:`BMI ~${(latestW/3.4225).toFixed(1)}`, c:'#a78bfa'},
  ].map(s=>`
    <div class="stile" style="--tc:${s.c}">
      <div class="stile-l">${s.l}</div>
      <div class="stile-v">${s.v}<span class="stile-u">${s.u}</span></div>
      <div class="stile-s">${s.s}</div>
    </div>`).join('');

  const days30 = Array.from({length:30}, (_,i) => {
    const d=new Date(today); d.setDate(today.getDate()-(29-i)); return d;
  });
  document.getElementById('hist').innerHTML =
    '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:10px 0 8px">30-Day History</div>' +
    HABITS.map(h => {
      const hh = habHist[h.id] || {};
      return `
      <div class="hcard">
        <div class="hcard-name" style="color:${h.color}">${h.icon} ${h.name}</div>
        <div class="hdots">
          ${days30.map(d => {
            const k=d.toDateString(), iF=d>today, iT=k===todayKey;
            const cls = hh[k]?'hdot on':(!iF&&!iT)?'hdot miss':'hdot';
            return `<div class="${cls}" style="--hc:${h.color}" title="${d.toLocaleDateString()}"></div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function goto(name, el) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('act'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('act'));
  document.getElementById('pg-'+name).classList.add('act');
  el.classList.add('act');
  if (name==='log')   { renderNotes(); renderWeights(); }
  if (name==='stats') renderStats();
  window.scrollTo(0,0);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initHeader() {
  const h = new Date().getHours();
  document.getElementById('greet').textContent = h<12?'Good morning ☀️':h<17?'Good afternoon 🌤':'Good evening 🌙';
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  document.getElementById('hday').textContent  = new Date().toLocaleDateString('en-GB',{weekday:'long'});
}

document.getElementById('note-inp').addEventListener('keydown', e=>{ if(e.key==='Enter') addNote(); });
document.getElementById('wt-inp').addEventListener('keydown',  e=>{ if(e.key==='Enter') addWeight(); });

// Auto-refresh every 30s when app is visible
setInterval(() => { if (!document.hidden) loadAll(); }, 30000);

initHeader();
loadAll();
</script>
</body>
</html>
